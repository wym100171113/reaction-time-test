<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Test - 反应时间测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== Header ========== */
        .header {
            width: 100%;
            background: #16213e;
            padding: 16px 0;
            border-bottom: 2px solid #0f3460;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e94560;
            letter-spacing: 1px;
        }

        .header .subtitle {
            font-size: 0.9rem;
            color: #8892b0;
            margin-top: 4px;
        }

        /* ========== Main Container ========== */
        .main-container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== Test Area ========== */
        .test-area {
            width: 100%;
            aspect-ratio: 16 / 10;
            max-height: 420px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.15s ease;
            position: relative;
            border: 2px solid rgba(255,255,255,0.05);
        }

        /* States */
        .test-area.waiting {
            background: #0f3460;
        }

        .test-area.ready {
            background: #c0392b;
        }

        .test-area.go {
            background: #27ae60;
        }

        .test-area.result {
            background: #0f3460;
        }

        .test-area.too-soon {
            background: #2980b9;
        }

        .test-area .state-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: all 0.15s ease;
        }

        .test-area .state-sub {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
            text-align: center;
        }

        .test-area .reaction-result {
            font-size: 3.5rem;
            font-weight: 800;
            color: #27ae60;
            text-shadow: 0 0 20px rgba(39,174,96,0.4);
        }

        .test-area .reaction-result.slow {
            color: #e67e22;
            text-shadow: 0 0 20px rgba(230,126,34,0.4);
        }

        .test-area .reaction-result.fast {
            color: #27ae60;
            text-shadow: 0 0 20px rgba(39,174,96,0.4);
        }

        .test-area .reaction-result.very-fast {
            color: #2ecc71;
            text-shadow: 0 0 25px rgba(46,204,113,0.5);
        }

        .test-area .trial-indicator {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .trial-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.2s ease;
        }

        .trial-dot.done {
            background: #27ae60;
        }

        .trial-dot.too-soon-dot {
            background: #e74c3c;
        }

        .trial-dot.current {
            background: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* ========== Stats Panel ========== */
        .stats-panel {
            width: 100%;
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: #16213e;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e94560;
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: #8892b0;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ========== Buttons ========== */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: #e94560;
            color: #fff;
        }

        .btn-primary:hover {
            background: #d63851;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-secondary:hover {
            background: #1a4a7a;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ========== History Section ========== */
        .history-section {
            width: 100%;
            margin-top: 24px;
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .history-section h3 {
            font-size: 1.1rem;
            color: #e0e0e0;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .history-entry .entry-avg {
            font-weight: 700;
            color: #e94560;
            font-size: 1.1rem;
        }

        .history-entry .entry-date {
            color: #8892b0;
            font-size: 0.8rem;
        }

        .history-entry .entry-detail {
            color: #8892b0;
            font-size: 0.8rem;
        }

        .history-empty {
            text-align: center;
            color: #8892b0;
            padding: 20px;
            font-size: 0.9rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.7;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .delete-btn:hover {
            opacity: 1;
            background: rgba(231,76,60,0.1);
        }

        /* ========== Save Prompt ========== */
        .save-prompt {
            display: none;
            margin-top: 20px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .save-prompt.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .save-prompt .avg-highlight {
            font-size: 2.5rem;
            font-weight: 800;
            color: #e94560;
        }

        .save-prompt p {
            color: #8892b0;
            margin: 8px 0 16px;
        }

        /* ========== Footer ========== */
        .footer {
            width: 100%;
            text-align: center;
            padding: 20px;
            color: #4a5568;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: auto;
        }

        .footer a {
            color: #8892b0;
            text-decoration: none;
        }

        .footer a:hover {
            color: #e94560;
        }

        /* ========== Responsive ========== */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .test-area .state-text {
                font-size: 1.5rem;
            }

            .test-area .reaction-result {
                font-size: 2.5rem;
            }

            .stats-panel {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .stat-card {
                padding: 12px 8px;
            }

            .stat-card .stat-value {
                font-size: 1.3rem;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>REACTION TIME TEST</h1>
        <p class="subtitle">测试你的反应速度</p>
    </div>

    <div class="main-container">
        <!-- Test Area -->
        <div class="test-area waiting" id="testArea">
            <div class="trial-indicator" id="trialIndicator">
                <div class="trial-dot" data-idx="0"></div>
                <div class="trial-dot" data-idx="1"></div>
                <div class="trial-dot" data-idx="2"></div>
                <div class="trial-dot" data-idx="3"></div>
                <div class="trial-dot" data-idx="4"></div>
            </div>
            <div class="state-text" id="stateText">点击开始测试</div>
            <div class="state-sub" id="stateSub">当红色变为绿色时，尽快点击</div>
            <div class="reaction-result" id="reactionResult" style="display:none"></div>
        </div>

        <!-- Stats Panel -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="avgTime">-- ms</div>
                <div class="stat-label">平均反应时间</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="bestTime">-- ms</div>
                <div class="stat-label">最佳成绩</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="roundCount">0 / 5</div>
                <div class="stat-label">本轮进度</div>
            </div>
        </div>

        <!-- Save Prompt -->
        <div class="save-prompt" id="savePrompt">
            <div class="avg-highlight" id="saveAvg">0 ms</div>
            <p>完成5次测试！保存你的成绩以追踪进度。</p>
            <div class="btn-row">
                <button class="btn btn-primary" id="saveBtn">保存成绩</button>
                <button class="btn btn-secondary" id="retryBtn">重新测试</button>
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-row" id="btnRow">
            <button class="btn btn-primary" id="startBtn">开始新测试</button>
            <button class="btn btn-secondary" id="resetBtn">重置本轮</button>
        </div>

        <!-- History -->
        <div class="history-section">
            <h3>
                历史记录
                <button class="btn btn-secondary" id="clearHistoryBtn" style="font-size:0.8rem;padding:6px 14px;">清空记录</button>
            </h3>
            <div class="history-list" id="historyList">
                <div class="history-empty">暂无记录，完成5次测试后保存</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>人类平均反应时间约 250ms | 世界纪录约 101ms</p>
        <p style="margin-top:4px;">参考 <a href="https://humanbenchmark.com" target="_blank">Human Benchmark</a></p>
    </div>

    <script>
    (function() {
        // ============ DOM Elements ============
        const testArea = document.getElementById('testArea');
        const stateText = document.getElementById('stateText');
        const stateSub = document.getElementById('stateSub');
        const reactionResult = document.getElementById('reactionResult');
        const trialIndicator = document.getElementById('trialIndicator');
        const trialDots = trialIndicator.querySelectorAll('.trial-dot');
        const avgTimeEl = document.getElementById('avgTime');
        const bestTimeEl = document.getElementById('bestTime');
        const roundCountEl = document.getElementById('roundCount');
        const savePrompt = document.getElementById('savePrompt');
        const saveAvg = document.getElementById('saveAvg');
        const saveBtn = document.getElementById('saveBtn');
        const retryBtn = document.getElementById('retryBtn');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const btnRow = document.getElementById('btnRow');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        // ============ State ============
        const TOTAL_TRIALS = 5;
        let state = 'idle'; // idle | ready | waiting-green | go | result | too-soon
        let currentTrial = 0;
        let trialTimes = [];
        let timeoutId = null;
        let allTimeBest = null;
        let history = [];

        // ============ Init ============
        function init() {
            loadHistory();
            loadAllTimeBest();
            renderHistory();
            updateAllTimeBestDisplay();
            resetRound();
        }

        function loadHistory() {
            try {
                const saved = localStorage.getItem('reaction-test-history');
                if (saved) {
                    history = JSON.parse(saved);
                }
            } catch(e) {
                history = [];
            }
        }

        function saveHistory() {
            try {
                localStorage.setItem('reaction-test-history', JSON.stringify(history));
            } catch(e) {}
        }

        function loadAllTimeBest() {
            try {
                const saved = localStorage.getItem('reaction-test-best');
                if (saved) {
                    allTimeBest = JSON.parse(saved);
                }
            } catch(e) {
                allTimeBest = null;
            }
        }

        function saveAllTimeBest(time) {
            if (allTimeBest === null || time < allTimeBest) {
                allTimeBest = time;
                try {
                    localStorage.setItem('reaction-test-best', JSON.stringify(allTimeBest));
                } catch(e) {}
            }
        }

        function updateAllTimeBestDisplay() {
            if (allTimeBest !== null) {
                bestTimeEl.textContent = allTimeBest + ' ms';
            } else {
                bestTimeEl.textContent = '-- ms';
            }
        }

        // ============ UI Helpers ============
        function setTestAreaState(newState) {
            testArea.className = 'test-area ' + newState;
            state = newState;
        }

        function showSavePrompt(avg) {
            saveAvg.textContent = avg + ' ms';
            savePrompt.classList.add('show');
            btnRow.style.display = 'none';
        }

        function hideSavePrompt() {
            savePrompt.classList.remove('show');
            btnRow.style.display = '';
        }

        function updateTrialDots() {
            trialDots.forEach((dot, i) => {
                dot.classList.remove('done', 'too-soon-dot', 'current');
                if (i < trialTimes.length) {
                    dot.classList.add('done');
                } else if (i === trialTimes.length && state === 'ready') {
                    dot.classList.add('current');
                }
            });
        }

        function updateStats() {
            if (trialTimes.length > 0) {
                const sum = trialTimes.reduce((a, b) => a + b, 0);
                const avg = Math.round(sum / trialTimes.length);
                avgTimeEl.textContent = avg + ' ms';
                roundCountEl.textContent = trialTimes.length + ' / ' + TOTAL_TRIALS;
            } else {
                avgTimeEl.textContent = '-- ms';
                roundCountEl.textContent = '0 / ' + TOTAL_TRIALS;
            }
        }

        function getReactionClass(time) {
            if (time < 180) return 'very-fast';
            if (time < 250) return 'fast';
            return 'slow';
        }

        function getReactionLabel(time) {
            if (time < 150) return '闪电反应！';
            if (time < 200) return '非常快！';
            if (time < 250) return '很快！';
            if (time < 300) return '不错';
            if (time < 400) return '一般';
            return '偏慢';
        }

        // ============ Core Logic ============
        function resetRound() {
            currentTrial = 0;
            trialTimes = [];
            timeoutId && clearTimeout(timeoutId);
            timeoutId = null;
            setTestAreaState('waiting');
            stateText.textContent = '点击开始测试';
            stateSub.textContent = '当红色变为绿色时，尽快点击';
            stateSub.style.display = '';
            reactionResult.style.display = 'none';
            hideSavePrompt();
            updateTrialDots();
            updateStats();
            startBtn.disabled = false;
            resetBtn.disabled = true;
        }

        function startTrial() {
            if (state !== 'idle' && state !== 'waiting') return;

            setTestAreaState('ready');
            stateText.textContent = '等待绿色...';
            stateSub.textContent = '不要提前点击！';
            stateSub.style.display = '';
            reactionResult.style.display = 'none';
            startBtn.disabled = true;
            resetBtn.disabled = true;
            updateTrialDots();

            // Random delay 1.5 - 5 seconds
            const delay = 1500 + Math.random() * 3500;

            timeoutId = setTimeout(() => {
                if (state !== 'ready') return;
                setTestAreaState('go');
                stateText.textContent = '点击！';
                stateSub.style.display = 'none';
                reactionResult.style.display = 'none';
                window._trialStartTime = performance.now();
            }, delay);
        }

        function handleTestAreaClick() {
            switch (state) {
                case 'idle':
                case 'waiting':
                    startTrial();
                    break;

                case 'ready':
                    // Too soon!
                    timeoutId && clearTimeout(timeoutId);
                    timeoutId = null;
                    setTestAreaState('too-soon');
                    stateText.textContent = '太快了！';
                    stateSub.textContent = '请等待绿色出现后再点击';
                    stateSub.style.display = '';
                    reactionResult.style.display = 'none';

                    // Mark trial as too soon
                    trialTimes.push(null); // null = too soon
                    updateTrialDots();
                    // Mark the dot as too-soon
                    if (trialDots[trialTimes.length - 1]) {
                        trialDots[trialTimes.length - 1].classList.add('too-soon-dot');
                    }

                    setTimeout(() => {
                        if (trialTimes.length >= TOTAL_TRIALS) {
                            finishRound();
                        } else {
                            resetToWaiting();
                        }
                    }, 1500);
                    break;

                case 'go':
                    // Correct reaction!
                    const reactionTime = Math.round(performance.now() - window._trialStartTime);
                    trialTimes.push(reactionTime);
                    saveAllTimeBest(reactionTime);
                    updateAllTimeBestDisplay();

                    setTestAreaState('result');
                    stateText.textContent = getReactionLabel(reactionTime);
                    stateSub.textContent = '';
                    stateSub.style.display = '';
                    reactionResult.style.display = '';
                    reactionResult.textContent = reactionTime + ' ms';
                    reactionResult.className = 'reaction-result ' + getReactionClass(reactionTime);

                    updateTrialDots();
                    updateStats();

                    timeoutId = setTimeout(() => {
                        if (trialTimes.filter(t => t !== null).length >= TOTAL_TRIALS) {
                            finishRound();
                        } else {
                            resetToWaiting();
                        }
                    }, 1500);
                    break;

                case 'too-soon':
                    // Already handling too-soon, ignore
                    break;

                case 'result':
                    // Showing result, ignore clicks
                    break;
            }
        }

        function resetToWaiting() {
            timeoutId && clearTimeout(timeoutId);
            timeoutId = null;
            setTestAreaState('waiting');
            stateText.textContent = '点击继续测试';
            stateSub.textContent = '当红色变为绿色时，尽快点击';
            stateSub.style.display = '';
            reactionResult.style.display = 'none';
            startBtn.disabled = false;
            resetBtn.disabled = trialTimes.length > 0;
            updateTrialDots();
        }

        function finishRound() {
            timeoutId && clearTimeout(timeoutId);
            timeoutId = null;

            const validTimes = trialTimes.filter(t => t !== null);
            if (validTimes.length === 0) {
                resetRound();
                return;
            }

            const sum = validTimes.reduce((a, b) => a + b, 0);
            const avg = Math.round(sum / validTimes.length);

            setTestAreaState('result');
            stateText.textContent = '测试完成！';
            stateSub.textContent = validTimes.length + '次有效反应';
            stateSub.style.display = '';
            reactionResult.style.display = '';
            reactionResult.textContent = avg + ' ms';
            reactionResult.className = 'reaction-result ' + getReactionClass(avg);
            updateStats();

            showSavePrompt(avg);
            startBtn.disabled = true;
            resetBtn.disabled = true;
        }

        function saveCurrentResult() {
            const validTimes = trialTimes.filter(t => t !== null);
            if (validTimes.length === 0) return;

            const sum = validTimes.reduce((a, b) => a + b, 0);
            const avg = Math.round(sum / validTimes.length);
            const best = Math.min(...validTimes);

            const entry = {
                date: new Date().toISOString(),
                avg: avg,
                best: best,
                times: [...validTimes],
                totalTrials: trialTimes.length
            };

            history.unshift(entry);
            // Keep only last 50 entries
            if (history.length > 50) {
                history = history.slice(0, 50);
            }
            saveHistory();
            renderHistory();
            resetRound();
            updateAllTimeBestDisplay();
        }

        // ============ History Rendering ============
        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">暂无记录，完成5次测试后保存</div>';
                return;
            }

            historyList.innerHTML = history.map((entry, index) => {
                const date = new Date(entry.date);
                const dateStr = date.toLocaleDateString('zh-CN', {
                    month: 'short', day: 'numeric'
                }) + ' ' + date.toLocaleTimeString('zh-CN', {
                    hour: '2-digit', minute: '2-digit'
                });

                const timesStr = entry.times.map(t => t + 'ms').join(', ');

                return `
                    <div class="history-entry">
                        <div>
                            <span class="entry-avg">${entry.avg} ms</span>
                            <span class="entry-detail" style="margin-left:8px;">最佳: ${entry.best} ms</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span class="entry-date">${dateStr}</span>
                            <button class="delete-btn" data-idx="${index}" title="删除">✕</button>
                        </div>
                    </div>
                `;
            }).join('');

            // Attach delete handlers
            historyList.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    history.splice(idx, 1);
                    saveHistory();
                    renderHistory();
                    updateAllTimeBestDisplay();
                });
            });
        }

        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                history = [];
                saveHistory();
                allTimeBest = null;
                try { localStorage.removeItem('reaction-test-best'); } catch(e) {}
                renderHistory();
                updateAllTimeBestDisplay();
            }
        }

        // ============ Event Listeners ============
        testArea.addEventListener('click', handleTestAreaClick);

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTestAreaClick();
            }
        });

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startTrial();
        });

        resetBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetRound();
        });

        saveBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            saveCurrentResult();
        });

        retryBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetRound();
        });

        clearHistoryBtn.addEventListener('click', clearHistory);

        // ============ Start ============
        init();
    })();
    </script>
</body>
</html>
