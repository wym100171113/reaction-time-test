<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Test - 反应时间测试</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #007aff;
            --brand-dark: #0064d6;
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e5e5ea;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #aeaeb2;
            --border: #d2d2d7;
            --success: #34c759;
            --error: #ff3b30;
            --warning: #ff9500;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
            --card-hover-shadow: 0 4px 24px rgba(0,0,0,0.12);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        .dark {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --text-primary: #f5f5f7;
            --text-secondary: #8e8e93;
            --text-tertiary: #636366;
            --border: #3a3a3c;
            --brand: #2e8dff;
            --brand-dark: #007aff;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.3);
            --card-hover-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ========== Header ========== */
        .header {
            width: 100%;
            background: var(--bg-secondary);
            padding: 18px 0;
            border-bottom: 0.5px solid var(--border);
            text-align: center;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .header .subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 500;
        }

        /* ========== Main Container ========== */
        .main-container {
            width: 100%;
            max-width: 700px;
            padding: 24px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== Test Area ========== */
        .test-area {
            width: 100%;
            aspect-ratio: 16 / 10;
            max-height: 420px;
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            border: 0.5px solid var(--border);
            box-shadow: var(--card-shadow);
        }

        /* States */
        .test-area.waiting {
            background: var(--bg-secondary);
        }

        .test-area.ready {
            background: var(--error);
            border-color: transparent;
            box-shadow: 0 8px 32px rgba(255,59,48,0.25);
        }

        .test-area.go {
            background: var(--success);
            border-color: transparent;
            box-shadow: 0 8px 32px rgba(52,199,89,0.3);
        }

        .test-area.result {
            background: var(--bg-secondary);
        }

        .test-area.too-soon {
            background: var(--warning);
            border-color: transparent;
            box-shadow: 0 8px 32px rgba(255,149,0,0.25);
        }

        .test-area .state-text {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            transition: color 0.25s ease;
            letter-spacing: -0.02em;
        }

        .test-area.ready .state-text,
        .test-area.go .state-text,
        .test-area.too-soon .state-text {
            color: #ffffff;
        }

        .test-area .state-sub {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
            font-weight: 500;
        }

        .test-area.ready .state-sub,
        .test-area.go .state-sub,
        .test-area.too-soon .state-sub {
            color: rgba(255,255,255,0.8);
        }

        .test-area .reaction-result {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--success);
            font-family: var(--font-mono);
            letter-spacing: -0.03em;
        }

        .test-area .reaction-result.slow {
            color: var(--warning);
        }

        .test-area .reaction-result.fast {
            color: var(--success);
        }

        .test-area .reaction-result.very-fast {
            color: var(--success);
        }

        .test-area .trial-indicator {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .trial-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            transition: all 0.25s ease;
        }

        .trial-dot.done {
            background: var(--success);
        }

        .trial-dot.too-soon-dot {
            background: var(--error);
        }

        .trial-dot.current {
            background: var(--brand);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.2);
        }

        /* ========== Stats Panel ========== */
        .stats-panel {
            width: 100%;
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 18px 14px;
            text-align: center;
            border: 0.5px solid var(--border);
            box-shadow: var(--card-shadow);
            transition: box-shadow 0.2s ease;
        }

        .stat-card:hover {
            box-shadow: var(--card-hover-shadow);
        }

        .stat-card .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--brand);
            font-family: var(--font-mono);
            letter-spacing: -0.03em;
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }

        /* ========== Buttons ========== */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 980px;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: -0.01em;
        }

        .btn-primary {
            background: var(--brand);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--brand-dark);
            transform: scale(1.02);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.42;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ========== History Section ========== */
        .history-section {
            width: 100%;
            margin-top: 24px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 22px;
            border: 0.5px solid var(--border);
            box-shadow: var(--card-shadow);
        }

        .history-section h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.01em;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            transition: background 0.15s ease;
        }

        .history-entry:hover {
            background: var(--bg-tertiary);
        }

        .history-entry .entry-avg {
            font-weight: 700;
            color: var(--brand);
            font-size: 1.05rem;
            font-family: var(--font-mono);
            letter-spacing: -0.02em;
        }

        .history-entry .entry-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .history-entry .entry-detail {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .history-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 28px 20px;
            font-size: 0.9rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--error);
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.6;
            padding: 4px 8px;
            border-radius: 6px;
            transition: opacity 0.15s ease, background 0.15s ease;
        }

        .delete-btn:hover {
            opacity: 1;
            background: rgba(255,59,48,0.1);
        }

        /* ========== Save Prompt ========== */
        .save-prompt {
            display: none;
            margin-top: 20px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .save-prompt.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .save-prompt .avg-highlight {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--brand);
            font-family: var(--font-mono);
            letter-spacing: -0.03em;
        }

        .save-prompt p {
            color: var(--text-secondary);
            margin: 8px 0 16px;
            font-size: 0.95rem;
        }

        /* ========== Footer ========== */
        .footer {
            width: 100%;
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 0.5px solid var(--border);
            margin-top: auto;
        }

        .footer a {
            color: var(--brand);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ========== Dark Mode Toggle ========== */
        .dark-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 20;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 0.5px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--card-shadow);
            transition: all 0.2s ease;
        }

        .dark-toggle:hover {
            box-shadow: var(--card-hover-shadow);
            transform: scale(1.05);
        }

        /* ========== Responsive ========== */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.3rem;
            }

            .test-area .state-text {
                font-size: 1.4rem;
            }

            .test-area .reaction-result {
                font-size: 2.5rem;
            }

            .stats-panel {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .stat-card {
                padding: 14px 8px;
            }

            .stat-card .stat-value {
                font-size: 1.25rem;
            }

            .btn {
                padding: 10px 24px;
                font-size: 0.9rem;
            }

            .dark-toggle {
                top: 72px;
            }
        }
    </style>
</head>
<body>
    <button class="dark-toggle" id="darkToggle" title="切换深色模式">🌓</button>
    <div class="header">
        <h1>REACTION TIME TEST</h1>
        <p class="subtitle">测试你的反应速度</p>
    </div>

    <div class="main-container">
        <!-- Test Area -->
        <div class="test-area waiting" id="testArea">
            <div class="trial-indicator" id="trialIndicator">
                <div class="trial-dot" data-idx="0"></div>
                <div class="trial-dot" data-idx="1"></div>
                <div class="trial-dot" data-idx="2"></div>
                <div class="trial-dot" data-idx="3"></div>
                <div class="trial-dot" data-idx="4"></div>
            </div>
            <div class="state-text" id="stateText">点击开始测试</div>
            <div class="state-sub" id="stateSub">当红色变为绿色时，尽快点击</div>
            <div class="reaction-result" id="reactionResult" style="display:none"></div>
        </div>

        <!-- Stats Panel -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="avgTime">-- ms</div>
                <div class="stat-label">平均反应时间</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="bestTime">-- ms</div>
                <div class="stat-label">最佳成绩</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="roundCount">0 / 5</div>
                <div class="stat-label">本轮进度</div>
            </div>
        </div>

        <!-- Save Prompt -->
        <div class="save-prompt" id="savePrompt">
            <div class="avg-highlight" id="saveAvg">0 ms</div>
            <p>完成5次测试！保存你的成绩以追踪进度。</p>
            <div class="btn-row">
                <button class="btn btn-primary" id="saveBtn">保存成绩</button>
                <button class="btn btn-secondary" id="retryBtn">重新测试</button>
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-row" id="btnRow">
            <button class="btn btn-primary" id="startBtn">开始新测试</button>
            <button class="btn btn-secondary" id="resetBtn">重置本轮</button>
        </div>

        <!-- History -->
        <div class="history-section">
            <h3>
                历史记录
                <button class="btn btn-secondary" id="clearHistoryBtn" style="font-size:0.8rem;padding:6px 14px;">清空记录</button>
            </h3>
            <div class="history-list" id="historyList">
                <div class="history-empty">暂无记录，完成5次测试后保存</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>人类平均反应时间约 250ms | 世界纪录约 101ms</p>
        <p style="margin-top:4px;">参考 <a href="https://humanbenchmark.com" target="_blank">Human Benchmark</a></p>
    </div>

    <script>
    (function() {
        // ============ DOM Elements ============
        const testArea = document.getElementById('testArea');
        const stateText = document.getElementById('stateText');
        const stateSub = document.getElementById('stateSub');
        const reactionResult = document.getElementById('reactionResult');
        const trialIndicator = document.getElementById('trialIndicator');
        const trialDots = trialIndicator.querySelectorAll('.trial-dot');
        const avgTimeEl = document.getElementById('avgTime');
        const bestTimeEl = document.getElementById('bestTime');
        const roundCountEl = document.getElementById('roundCount');
        const savePrompt = document.getElementById('savePrompt');
        const saveAvg = document.getElementById('saveAvg');
        const saveBtn = document.getElementById('saveBtn');
        const retryBtn = document.getElementById('retryBtn');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const btnRow = document.getElementById('btnRow');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        // ============ State ============
        const TOTAL_TRIALS = 5;
        let state = 'idle'; // idle | ready | waiting-green | go | result | too-soon
        let currentTrial = 0;
        let trialTimes = [];
        let timeoutId = null;
        let allTimeBest = null;
        let history = [];

        // ============ Dark Mode ============
        const darkToggle = document.getElementById('darkToggle');
        let isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

        function applyDarkMode() {
            document.documentElement.classList.toggle('dark', isDark);
            darkToggle.textContent = isDark ? '☀️' : '🌓';
        }

        // Init dark mode from preference or stored choice
        try {
            const stored = localStorage.getItem('reaction-test-dark-mode');
            if (stored !== null) isDark = stored === 'true';
        } catch(e) {}
        applyDarkMode();

        darkToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            isDark = !isDark;
            try { localStorage.setItem('reaction-test-dark-mode', isDark); } catch(e) {}
            applyDarkMode();
        });

        // ============ Init ============
        function init() {
            loadHistory();
            loadAllTimeBest();
            renderHistory();
            updateAllTimeBestDisplay();
            resetRound();
        }

        function loadHistory() {
            try {
                const saved = localStorage.getItem('reaction-test-history');
                if (saved) {
                    history = JSON.parse(saved);
                }
            } catch(e) {
                history = [];
            }
        }

        function saveHistory() {
            try {
                localStorage.setItem('reaction-test-history', JSON.stringify(history));
            } catch(e) {}
        }

        function loadAllTimeBest() {
            try {
                const saved = localStorage.getItem('reaction-test-best');
                if (saved) {
                    allTimeBest = JSON.parse(saved);
                }
            } catch(e) {
                allTimeBest = null;
            }
        }

        function saveAllTimeBest(time) {
            if (allTimeBest === null || time < allTimeBest) {
                allTimeBest = time;
                try {
                    localStorage.setItem('reaction-test-best', JSON.stringify(allTimeBest));
                } catch(e) {}
            }
        }

        function updateAllTimeBestDisplay() {
            if (allTimeBest !== null) {
                bestTimeEl.textContent = allTimeBest + ' ms';
            } else {
                bestTimeEl.textContent = '-- ms';
            }
        }

        // ============ UI Helpers ============
        function setTestAreaState(newState) {
            testArea.className = 'test-area ' + newState;
            state = newState;
        }

        function showSavePrompt(avg) {
            saveAvg.textContent = avg + ' ms';
            savePrompt.classList.add('show');
            btnRow.style.display = 'none';
        }

        function hideSavePrompt() {
            savePrompt.classList.remove('show');
            btnRow.style.display = '';
        }

        function updateTrialDots() {
            trialDots.forEach((dot, i) => {
                dot.classList.remove('done', 'too-soon-dot', 'current');
                if (i < trialTimes.length) {
                    dot.classList.add('done');
                } else if (i === trialTimes.length && state === 'ready') {
                    dot.classList.add('current');
                }
            });
        }

        function updateStats() {
            if (trialTimes.length > 0) {
                const sum = trialTimes.reduce((a, b) => a + b, 0);
                const avg = Math.round(sum / trialTimes.length);
                avgTimeEl.textContent = avg + ' ms';
                roundCountEl.textContent = trialTimes.length + ' / ' + TOTAL_TRIALS;
            } else {
                avgTimeEl.textContent = '-- ms';
                roundCountEl.textContent = '0 / ' + TOTAL_TRIALS;
            }
        }

        function getReactionClass(time) {
            if (time < 180) return 'very-fast';
            if (time < 250) return 'fast';
            return 'slow';
        }

        function getReactionLabel(time) {
            if (time < 150) return '闪电反应！';
            if (time < 200) return '非常快！';
            if (time < 250) return '很快！';
            if (time < 300) return '不错';
            if (time < 400) return '一般';
            return '偏慢';
        }

        // ============ Core Logic ============
        function resetRound() {
            currentTrial = 0;
            trialTimes = [];
            timeoutId && clearTimeout(timeoutId);
            timeoutId = null;
            setTestAreaState('waiting');
            stateText.textContent = '点击开始测试';
            stateSub.textContent = '当红色变为绿色时，尽快点击';
            stateSub.style.display = '';
            reactionResult.style.display = 'none';
            hideSavePrompt();
            updateTrialDots();
            updateStats();
            startBtn.disabled = false;
            resetBtn.disabled = true;
        }

        function startTrial() {
            if (state !== 'idle' && state !== 'waiting') return;

            setTestAreaState('ready');
            stateText.textContent = '等待绿色...';
            stateSub.textContent = '不要提前点击！';
            stateSub.style.display = '';
            reactionResult.style.display = 'none';
            startBtn.disabled = true;
            resetBtn.disabled = true;
            updateTrialDots();

            // Random delay 1.5 - 5 seconds
            const delay = 1500 + Math.random() * 3500;

            timeoutId = setTimeout(() => {
                if (state !== 'ready') return;
                setTestAreaState('go');
                stateText.textContent = '点击！';
                stateSub.style.display = 'none';
                reactionResult.style.display = 'none';
                window._trialStartTime = performance.now();
            }, delay);
        }

        function handleTestAreaClick() {
            switch (state) {
                case 'idle':
                case 'waiting':
                    startTrial();
                    break;

                case 'ready':
                    // Too soon!
                    timeoutId && clearTimeout(timeoutId);
                    timeoutId = null;
                    setTestAreaState('too-soon');
                    stateText.textContent = '太快了！';
                    stateSub.textContent = '请等待绿色出现后再点击';
                    stateSub.style.display = '';
                    reactionResult.style.display = 'none';

                    // 太快不推进进度，不计数，重试当前次
                    updateTrialDots();

                    setTimeout(() => {
                        resetToWaiting();
                    }, 1500);
                    break;

                case 'go':
                    // Correct reaction!
                    const reactionTime = Math.round(performance.now() - window._trialStartTime);
                    trialTimes.push(reactionTime);
                    saveAllTimeBest(reactionTime);
                    updateAllTimeBestDisplay();

                    setTestAreaState('result');
                    stateText.textContent = getReactionLabel(reactionTime);
                    stateSub.textContent = '';
                    stateSub.style.display = '';
                    reactionResult.style.display = '';
                    reactionResult.textContent = reactionTime + ' ms';
                    reactionResult.className = 'reaction-result ' + getReactionClass(reactionTime);

                    updateTrialDots();
                    updateStats();

                    timeoutId = setTimeout(() => {
                        if (trialTimes.length >= TOTAL_TRIALS) {
                            finishRound();
                        } else {
                            resetToWaiting();
                        }
                    }, 1500);
                    break;

                case 'too-soon':
                    // Already handling too-soon, ignore
                    break;

                case 'result':
                    // Showing result, ignore clicks
                    break;
            }
        }

        function resetToWaiting() {
            timeoutId && clearTimeout(timeoutId);
            timeoutId = null;
            setTestAreaState('waiting');
            stateText.textContent = '点击继续测试';
            stateSub.textContent = '当红色变为绿色时，尽快点击';
            stateSub.style.display = '';
            reactionResult.style.display = 'none';
            startBtn.disabled = false;
            resetBtn.disabled = trialTimes.length > 0;
            updateTrialDots();
        }

        function finishRound() {
            timeoutId && clearTimeout(timeoutId);
            timeoutId = null;

            if (trialTimes.length === 0) {
                resetRound();
                return;
            }

            const sum = trialTimes.reduce((a, b) => a + b, 0);
            const avg = Math.round(sum / trialTimes.length);

            setTestAreaState('result');
            stateText.textContent = '测试完成！';
            stateSub.textContent = trialTimes.length + '次有效反应';
            stateSub.style.display = '';
            reactionResult.style.display = '';
            reactionResult.textContent = avg + ' ms';
            reactionResult.className = 'reaction-result ' + getReactionClass(avg);
            updateStats();

            showSavePrompt(avg);
            startBtn.disabled = true;
            resetBtn.disabled = true;
        }

        function saveCurrentResult() {
            if (trialTimes.length === 0) return;

            const sum = trialTimes.reduce((a, b) => a + b, 0);
            const avg = Math.round(sum / trialTimes.length);
            const best = Math.min(...trialTimes);

            const entry = {
                date: new Date().toISOString(),
                avg: avg,
                best: best,
                times: [...trialTimes],
                totalTrials: trialTimes.length
            };

            history.unshift(entry);
            // Keep only last 50 entries
            if (history.length > 50) {
                history = history.slice(0, 50);
            }
            saveHistory();
            renderHistory();
            resetRound();
            updateAllTimeBestDisplay();
        }

        // ============ History Rendering ============
        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">暂无记录，完成5次测试后保存</div>';
                return;
            }

            historyList.innerHTML = history.map((entry, index) => {
                const date = new Date(entry.date);
                const dateStr = date.toLocaleDateString('zh-CN', {
                    month: 'short', day: 'numeric'
                }) + ' ' + date.toLocaleTimeString('zh-CN', {
                    hour: '2-digit', minute: '2-digit'
                });

                return `
                    <div class="history-entry">
                        <div>
                            <span class="entry-avg">${entry.avg} ms</span>
                            <span class="entry-detail" style="margin-left:8px;">最佳: ${entry.best} ms</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span class="entry-date">${dateStr}</span>
                            <button class="delete-btn" data-idx="${index}" title="删除">✕</button>
                        </div>
                    </div>
                `;
            }).join('');

            // Attach delete handlers
            historyList.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    history.splice(idx, 1);
                    saveHistory();
                    renderHistory();
                    updateAllTimeBestDisplay();
                });
            });
        }

        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                history = [];
                saveHistory();
                allTimeBest = null;
                try { localStorage.removeItem('reaction-test-best'); } catch(e) {}
                renderHistory();
                updateAllTimeBestDisplay();
            }
        }

        // ============ Event Listeners ============
        testArea.addEventListener('click', handleTestAreaClick);

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleTestAreaClick();
            }
        });

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startTrial();
        });

        resetBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetRound();
        });

        saveBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            saveCurrentResult();
        });

        retryBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetRound();
        });

        clearHistoryBtn.addEventListener('click', clearHistory);

        // ============ Start ============
        init();
    })();
    </script>
</body>
</html>
